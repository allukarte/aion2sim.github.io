<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>무스펠의 성배 — 신호등 연습 (RPG 3인칭)</title>
<style>
  :root{
    --bg:#070912; --panel:#171b25; --panel2:#1d2230; --line:#2a3142;
    --txt:#e8ecf4; --muted:#8b95a8; --accent:#ff7a18;
    --red:#ff4d5e; --green:#27d97a; --blue:#4db5ff;
    --shadow:0 8px 30px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;background:var(--bg);overflow:hidden;
    font-family:"Pretendard","Segoe UI",system-ui,-apple-system,"Malgun Gothic",sans-serif;color:var(--txt);}
  canvas{display:block;touch-action:none;}

  #hud{position:fixed;inset:0;pointer-events:none;z-index:5;}
  .topbar{position:absolute;top:12px;left:50%;transform:translateX(-50%);
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center;
    padding:9px 14px;background:rgba(23,27,37,.82);border:1px solid var(--line);
    border-radius:14px;box-shadow:var(--shadow);pointer-events:auto;backdrop-filter:blur(6px);max-width:94vw;}
  .topbar h1{font-size:15px;font-weight:800;letter-spacing:-.3px;display:flex;gap:7px;align-items:center;white-space:nowrap;}
  .topbar h1 .flame{filter:drop-shadow(0 0 8px var(--accent));}
  .mini{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);font-weight:700;}
  select{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:7px 9px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;}
  .btn{border:none;border-radius:11px;padding:9px 18px;font-size:14px;font-weight:800;cursor:pointer;transition:.13s;letter-spacing:.3px;}
  .btn:active{transform:translateY(1px);}
  .btn.primary{background:linear-gradient(180deg,var(--accent),#e0640d);color:#fff;box-shadow:0 6px 18px rgba(255,122,24,.4);}
  .btn.ghost{background:var(--panel2);color:var(--txt);border:1px solid var(--line);padding:9px 13px;}

  #legend{position:absolute;top:74px;left:14px;background:rgba(23,27,37,.7);border:1px solid var(--line);
    border-radius:12px;padding:10px 12px;font-size:12px;min-width:170px;backdrop-filter:blur(6px);}
  #legend .ttl{font-weight:800;color:var(--muted);margin-bottom:7px;font-size:11px;letter-spacing:.3px;}
  #legend .row{display:flex;align-items:center;gap:8px;margin:5px 0;font-weight:700;}
  #legend .dot{width:14px;height:14px;border-radius:50%;flex:0 0 14px;box-shadow:0 0 8px currentColor;}
  #legend .row.gone{opacity:.32;}
  #legend .row.gone .dot{box-shadow:none;}
  #legend .chk{margin-left:auto;color:var(--green);font-weight:900;}

  #status{position:absolute;top:74px;right:14px;text-align:right;background:rgba(23,27,37,.7);
    border:1px solid var(--line);border-radius:12px;padding:10px 14px;backdrop-filter:blur(6px);}
  #status .big{font-size:22px;font-weight:900;color:#ffd29a;text-shadow:0 0 12px rgba(255,170,70,.4);}
  #status .sub{font-size:12px;color:var(--muted);font-weight:700;margin-top:3px;}
  #status .wrong{font-size:12px;font-weight:800;margin-top:6px;color:var(--muted);}
  #status .wrong b{color:var(--red);}
  #status .hpwrap{margin-top:8px;}
  #status .hplabel{font-size:11px;font-weight:800;color:var(--muted);margin-bottom:3px;}
  #status .hpbar{width:150px;height:12px;border-radius:7px;background:#2a1416;border:1px solid var(--line);overflow:hidden;margin-left:auto;}
  #status .hpfill{height:100%;width:100%;border-radius:6px;
    background:linear-gradient(90deg,#27d97a,#9be86a 60%,#ffd23f);transition:width .25s, background .25s;}
  #status .hpfill.mid{background:linear-gradient(90deg,#ffb454,#ffd23f);}
  #status .hpfill.low{background:linear-gradient(90deg,#ff4d5e,#ff7a18);}
  #status .stwrap{margin-top:6px;}
  #status .stlabel{font-size:10px;font-weight:800;color:var(--muted);margin-bottom:2px;}
  #status .stbar{width:150px;height:6px;border-radius:4px;background:#241405;border:1px solid var(--line);overflow:hidden;margin-left:auto;}
  #status .stfill{height:100%;width:100%;border-radius:3px;background:linear-gradient(90deg,#ff7a18,#ffc04d);box-shadow:0 0 6px rgba(255,140,40,.5) inset;transition:width .12s linear;}
  /* 방패막기 스킬 아이콘 (화면 하단) */
  #shieldSkill{position:absolute;left:218px;bottom:14px;width:58px;height:58px;border-radius:13px;
    display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 38% 30%, #4db5ff, #0b1828 82%);
    border:2px solid rgba(255,255,255,.28);box-shadow:0 4px 14px rgba(0,0,0,.5), inset 0 0 12px rgba(120,200,255,.22);
    color:#fff;font-weight:800;pointer-events:none;transition:opacity .18s, box-shadow .18s;}
  #shieldSkill.charged{box-shadow:0 4px 16px rgba(0,0,0,.5), 0 0 16px rgba(90,190,255,.6), inset 0 0 14px rgba(150,215,255,.35);}
  #shieldSkill .ss-glyph{font-size:30px;line-height:1;filter:drop-shadow(0 1px 3px #000);}
  #shieldSkill .ss-key{position:absolute;top:3px;left:7px;font-size:12px;text-shadow:0 1px 3px #000;letter-spacing:.3px;}
  #shieldSkill .ss-count{position:absolute;right:5px;bottom:2px;font-size:17px;font-weight:900;text-shadow:0 1px 4px #000;z-index:2;}
  #shieldSkill .ss-cd{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
    background:rgba(8,10,16,.55);border-radius:11px;color:#cfe9ff;font-size:22px;font-weight:900;text-shadow:0 1px 3px #000;}

  #hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
    font-size:12px;color:var(--muted);font-weight:600;background:rgba(23,27,37,.6);
    padding:6px 14px;border-radius:20px;border:1px solid var(--line);white-space:nowrap;max-width:94vw;text-align:center;}

  /* 좌하단 물약 UI */
  #potions{position:absolute;left:14px;bottom:14px;display:flex;gap:10px;pointer-events:none;}
  .potion{position:relative;width:58px;height:58px;border-radius:13px;overflow:hidden;
    background:radial-gradient(circle at 38% 30%, var(--pc), #150a0c 82%);
    border:2px solid rgba(255,255,255,.28);box-shadow:0 4px 14px rgba(0,0,0,.5), inset 0 0 12px rgba(255,255,255,.18);
    display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-weight:800;}
  .potion .pkey{font-size:15px;text-shadow:0 1px 3px #000;letter-spacing:.3px;}
  .potion .pheal{font-size:11px;opacity:.92;text-shadow:0 1px 2px #000;margin-top:1px;}
  .potion .pcd{position:absolute;left:0;bottom:0;width:100%;background:rgba(8,8,12,.74);
    display:none;align-items:flex-end;justify-content:center;color:#ffd29a;font-size:19px;font-weight:900;padding-bottom:3px;}
  .potion.cooling{filter:grayscale(.45) brightness(.7);}

  /* 가상 조이스틱 (터치) */
  #stick{position:absolute;left:0;bottom:0;width:46%;height:55%;pointer-events:auto;display:none;}
  #stickBase{position:absolute;width:120px;height:120px;border-radius:50%;
    border:2px solid rgba(255,255,255,.18);background:rgba(255,255,255,.05);transform:translate(-50%,-50%);display:none;}
  #stickKnob{position:absolute;width:54px;height:54px;border-radius:50%;
    background:radial-gradient(circle at 40% 35%,#ffd9a8,#ff7a18);box-shadow:0 0 18px rgba(255,122,24,.6);transform:translate(-50%,-50%);display:none;}
  body.touch #stick{display:block;}

  #over{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
    gap:16px;background:rgba(10,8,6,.78);backdrop-filter:blur(3px);pointer-events:auto;text-align:center;padding:20px;}
  #over.show{display:flex;}
  #over h2{font-size:32px;font-weight:900;color:var(--red);letter-spacing:1px;text-shadow:0 0 22px rgba(255,77,94,.5);}
  #over p{color:var(--muted);font-size:14px;}

  @media (max-width:560px){ #legend,#status{font-size:11px;padding:8px 10px;} #hint{font-size:11px;} .topbar h1{font-size:13px;} }
</style>
<script type="importmap">{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}</script>
</head>
<body>
<div id="hud">
  <div class="topbar">
    <h1><span class="flame">🔥</span> 무스펠의 성배 — RPG</h1>
    <label class="mini">시작 위치
      <select id="clock">
        <option value="12">12시</option><option value="1">1시 (두 줄)</option><option value="2">2시</option>
        <option value="3">3시</option><option value="4" selected>4시 (두 줄)</option><option value="5">5시</option>
        <option value="6">6시</option><option value="7">7시 (두 줄)</option><option value="8">8시</option>
        <option value="9">9시</option><option value="10">10시 (두 줄)</option><option value="11">11시</option>
      </select>
    </label>
    <button class="btn primary" id="startBtn">▶ 시작</button>
    <button class="btn ghost" id="resetBtn">↺</button>
  </div>

  <div id="legend">
    <div class="ttl">테두리 (바깥 → 안쪽)</div>
    <div class="row" data-i="0"><span class="dot"></span><span class="lbl">1번 구슬</span><span class="chk"></span></div>
    <div class="row" data-i="1"><span class="dot"></span><span class="lbl">2번 구슬</span><span class="chk"></span></div>
    <div class="row" data-i="2"><span class="dot"></span><span class="lbl">3번 구슬</span><span class="chk"></span></div>
  </div>

  <div id="status">
    <div class="big" id="expTxt">폭발 0/7</div>
    <div class="sub" id="nextTxt">시작을 누르세요</div>
    <div class="wrong" id="wrongTxt">오답 <b>0</b> / 2</div>
    <div class="hpwrap">
      <div class="hplabel" id="hpLabel">체력 100%</div>
      <div class="hpbar"><div class="hpfill" id="hpFill"></div></div>
    </div>
    <div class="stwrap">
      <div class="stlabel">행동력</div>
      <div class="stbar"><div class="stfill" id="stFill"></div></div>
    </div>
  </div>

  <div id="hint">Space/Enter 시작·중지 · P 리셋 &nbsp;|&nbsp; WASD 이동 · Shift 대쉬 · R 방패막기(3회·7초당 충전) &nbsp;|&nbsp; F1/F2/F3 물약 &nbsp;|&nbsp; 클릭→마우스 시점(ESC) · 휠 줌 &nbsp;|&nbsp; ⚠ 붉은 장판: 피하거나 R로 막기!</div>

  <!-- 좌하단 물약(포션) UI -->
  <div id="potions">
    <div class="potion" style="--pc:#ff4d5e"><div class="pcd"></div><div class="pkey">F1</div><div class="pheal">+50%</div></div>
    <div class="potion" style="--pc:#27d97a"><div class="pcd"></div><div class="pkey">F2</div><div class="pheal">+30%</div></div>
    <div class="potion" style="--pc:#4db5ff"><div class="pcd"></div><div class="pkey">F3</div><div class="pheal">+30%</div></div>
  </div>

  <!-- 방패막기 스킬 아이콘: 남은 충전수(우하단 숫자) · 재충전 카운트다운 · 충전수에 따라 색 진하기 -->
  <div id="shieldSkill">
    <div class="ss-glyph">🛡️</div>
    <div class="ss-key">R</div>
    <div class="ss-cd" id="ssCd"></div>
    <div class="ss-count" id="ssCount">3</div>
  </div>

  <div id="stick">
    <div id="stickBase"></div>
    <div id="stickKnob"></div>
  </div>

  <div id="over">
    <h2>게임 실패</h2>
    <p>잘못된 색 구슬 2개가 보스에 들어갔습니다.</p>
    <button class="btn primary" id="retryBtn">▶ 다시 시작</button>
  </div>
</div>

<!-- =================== RPG 3인칭 렌더 (Three.js) =================== -->
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

const M = window.MUSPEL;
const G = M.G, COL = M.COL;
const TAU = Math.PI*2;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerpAngle=(a,b,t)=>{ let d=((b-a+Math.PI)%TAU+TAU)%TAU-Math.PI; return a+d*t; };
G.externalMove = true; // 캐릭터 이동은 렌더 측이 카메라 상대로 직접 제어

// ---------- renderer / scene ----------
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,1.5)); // 성능: 픽셀비율 상한 1.5
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFShadowMap;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a0704);
scene.fog = new THREE.Fog(0x2a0a04, 170, 700); // 용암 대기(붉은 안개)

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 300);

// ---------- lights ----------
scene.add(new THREE.HemisphereLight(0xff7a2a, 0x1a0500, 0.55)); // 용암 빛(위=주황, 아래=암적)
const sun = new THREE.DirectionalLight(0xffd0a0, 0.9); sun.position.set(7,18,9); scene.add(sun);
sun.castShadow = true;
sun.shadow.mapSize.set(1024,1024); // 성능: 그림자맵 축소
sun.shadow.camera.near=1; sun.shadow.camera.far=125;
sun.shadow.camera.left=-48; sun.shadow.camera.right=48; sun.shadow.camera.top=48; sun.shadow.camera.bottom=-48;
sun.shadow.bias=-0.0004; sun.shadow.normalBias=0.02;
const bossLight = new THREE.PointLight(0xff5a18, 3.0, 50, 2); bossLight.position.set(0, M.BOSS_R*1.8, 0); scene.add(bossLight);

// 환경광(PBR 반사) — RoomEnvironment 기반 IBL
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
scene.environmentIntensity = 0.35;

// ---------- postproc ----------
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight), 0.7, 0.5, 0.7);
composer.addPass(bloom);
composer.addPass(new OutputPass());
addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight); composer.setSize(innerWidth,innerHeight);
});

// ---------- helpers ----------
function makeTextTexture(txt, {size=128, color="#fff", font="bold 80px sans-serif"}={}){
  const c=document.createElement("canvas"); c.width=c.height=size; const x=c.getContext("2d");
  x.fillStyle=color; x.font=font; x.textAlign="center"; x.textBaseline="middle"; x.fillText(txt,size/2,size/2+2);
  const t=new THREE.CanvasTexture(c); t.anisotropy=4; return t;
}
// 용암 텍스처(어두운 현무암 + 발광 용암 풀/균열) — emissiveMap으로 빛남
function makeLavaTexture(size=512){
  const c=document.createElement("canvas"); c.width=c.height=size; const x=c.getContext("2d");
  x.fillStyle="#140604"; x.fillRect(0,0,size,size);
  for(let i=0;i<54;i++){
    const px=Math.random()*size, py=Math.random()*size, rr=size*(0.02+Math.random()*0.1);
    const g=x.createRadialGradient(px,py,0,px,py,rr);
    g.addColorStop(0,"#ffe25a"); g.addColorStop(0.4,"#ff6a1e"); g.addColorStop(1,"rgba(110,18,4,0)");
    x.fillStyle=g; x.beginPath(); x.arc(px,py,rr,0,Math.PI*2); x.fill();
  }
  x.strokeStyle="rgba(255,120,40,0.5)";
  for(let i=0;i<44;i++){
    x.lineWidth=1+Math.random()*2.2; x.beginPath();
    let px=Math.random()*size, py=Math.random()*size; x.moveTo(px,py);
    for(let j=0;j<5;j++){ px+=(Math.random()-0.5)*size*0.2; py+=(Math.random()-0.5)*size*0.2; x.lineTo(px,py); }
    x.stroke();
  }
  const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.anisotropy=4; return t;
}
const lavaTex=makeLavaTexture(512); lavaTex.repeat.set(10,10);

// ---------- world: 용암 대지 + 아레나 + 시계 눈금 + 둘레 기둥 ----------
{
  // 바깥은 끓는 용암 바다(발광)
  const ground=new THREE.Mesh(new THREE.CircleGeometry(640,96),
    new THREE.MeshStandardMaterial({map:lavaTex, emissiveMap:lavaTex, emissive:0xffffff, emissiveIntensity:1.2, color:0x442018, roughness:0.9, metalness:0}));
  ground.rotation.x=-Math.PI/2; ground.position.y=-0.05; ground.receiveShadow=true; scene.add(ground);

  // 아레나는 식은 현무암 발판(가독성 위해 어둡게, 균열만 은은히 발광)
  const floor=new THREE.Mesh(new THREE.CircleGeometry(M.ARENA_R,96),
    new THREE.MeshStandardMaterial({color:0x160d0a, emissive:0x5e1604, emissiveIntensity:0.28, roughness:0.95, metalness:0.05}));
  floor.rotation.x=-Math.PI/2; floor.position.y=0; floor.receiveShadow=true; scene.add(floor);

  const rim=new THREE.Mesh(new THREE.RingGeometry(M.ARENA_R-0.2, M.ARENA_R, 96),
    new THREE.MeshBasicMaterial({color:0xff6a1e, transparent:true, opacity:0.9, side:THREE.DoubleSide, blending:THREE.AdditiveBlending}));
  rim.rotation.x=-Math.PI/2; rim.position.y=0.02; scene.add(rim);

  const lineMat=new THREE.LineBasicMaterial({color:0x5a2a14, transparent:true, opacity:0.5});
  for(let h=1;h<=12;h++){
    const d=M.clockDirXZ(h);
    const g=new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(d.x*M.BOSS_R,0.01,d.z*M.BOSS_R),
      new THREE.Vector3(d.x*M.ARENA_R,0.01,d.z*M.ARENA_R)]);
    scene.add(new THREE.Line(g,lineMat));
    const num=new THREE.Mesh(new THREE.PlaneGeometry(1.4,1.4),
      new THREE.MeshBasicMaterial({map:makeTextTexture(h+"",{color:"rgba(255,190,130,0.9)",font:"bold 70px sans-serif"}),transparent:true}));
    num.rotation.x=-Math.PI/2; num.position.set(d.x*(M.ARENA_R-1.4),0.03,d.z*(M.ARENA_R-1.4)); scene.add(num);
    // 둘레 화톳불 기둥(용암 발광)
    const pil=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.16,1.0,8),
      new THREE.MeshStandardMaterial({color:0x1a0d08, emissive:0x661a08, emissiveIntensity:0.8, roughness:0.6}));
    pil.position.set(d.x*(M.ARENA_R+1.2),0.5,d.z*(M.ARENA_R+1.2)); scene.add(pil);
    const cap=new THREE.Mesh(new THREE.SphereGeometry(0.16,12,10),
      new THREE.MeshStandardMaterial({color:0x111111, emissive:0xff7a18, emissiveIntensity:1.4}));
    cap.position.set(d.x*(M.ARENA_R+1.2),1.1,d.z*(M.ARENA_R+1.2)); scene.add(cap);
  }
  for(const rr of [M.ARENA_R*0.35, M.ARENA_R*0.6, M.ARENA_R*0.82]){
    const seg=96,pts=[]; for(let i=0;i<=seg;i++){const a=i/seg*TAU;pts.push(new THREE.Vector3(Math.cos(a)*rr,0.008,Math.sin(a)*rr));}
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),lineMat));
  }
}

// ---------- 주변 장식: 흑요석 용암 첨탑(붉게 달궈진 바위) ----------
{
  const cMat=new THREE.MeshStandardMaterial({color:0x140a08, emissive:0xff3a10, emissiveIntensity:0.7, metalness:0.2, roughness:0.55, flatShading:true});
  for(let i=0;i<26;i++){
    const a=(i/26)*TAU+0.35, r=M.ARENA_R+6+(i%4)*6;
    const cl=new THREE.Group();
    const h=3.0+(i%4)*1.8;
    const c1=new THREE.Mesh(new THREE.ConeGeometry(1.0,h,5), cMat); c1.position.y=h/2; cl.add(c1);

function rr(ctx,x,y,w,h,r){ r=Math.min(r,h/2,w/2); ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

  // ----- 체력 바 (상단) -----
  ctx.fillStyle='rgba(18,5,6,0.85)'; rr(ctx,1,1,w-2,24,8); ctx.fill();
  const hpw=(w-8)*Math.max(0,Math.min(100,hp))/100;
  if(hpw>0){ ctx.fillStyle='#ff2230'; rr(ctx,4,4,hpw,18,5); ctx.fill();
    ctx.fillStyle='rgba(255,150,150,0.5)'; rr(ctx,4,4,hpw,9,5); ctx.fill(); }
  ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=2; rr(ctx,1,1,w-2,24,8); ctx.stroke();
  // ----- 행동력 게이지 (하단, 얇은 주황) -----
  ctx.fillStyle='rgba(20,10,2,0.85)'; rr(ctx,1,28,w-2,10,5); ctx.fill();

}

let actx=null;
function tone(f,d=.08,t="square",v=.15){ if(!G.sound)return;
  try{actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(),g=actx.createGain();o.type=t;o.frequency.value=f;
    g.gain.value=v;o.connect(g);g.connect(actx.destination);const tt=actx.currentTime;o.start(tt);
    g.gain.exponentialRampToValueAtTime(.0001,tt+d);o.stop(tt+d);}catch(e){}
}
// "펑~" — 장판 폭발음. 저음 펀치(몸통) + 둔탁한 노이즈 버스트(터짐 질감)
function boom(){ if(!G.sound)return;
  try{
    actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    const t=actx.currentTime;
    // 1) 저음 펀치 — 주파수가 빠르게 하강하며 "펑"의 몸통을 만든다
    const o=actx.createOscillator(), og=actx.createGain();
    o.type="sine"; o.frequency.setValueAtTime(170,t); o.frequency.exponentialRampToValueAtTime(40,t+0.38);
    og.gain.setValueAtTime(0.0001,t); og.gain.exponentialRampToValueAtTime(0.7,t+0.015);
    og.gain.exponentialRampToValueAtTime(0.0001,t+0.55);
    o.connect(og); og.connect(actx.destination); o.start(t); o.stop(t+0.6);
    // 2) 노이즈 버스트 — 로우패스 컷오프를 떨궈 둔탁하게(쉬익→펑)
    const n=actx.sampleRate*0.5, buf=actx.createBuffer(1,n,actx.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/n,2.2);
    const src=actx.createBufferSource(); src.buffer=buf;
    const f=actx.createBiquadFilter(); f.type="lowpass";
    f.frequency.setValueAtTime(2000,t); f.frequency.exponentialRampToValueAtTime(230,t+0.42);
    const ng=actx.createGain(); ng.gain.setValueAtTime(0.55,t); ng.gain.exponentialRampToValueAtTime(0.0001,t+0.5);
    src.connect(f); f.connect(ng); ng.connect(actx.destination); src.start(t); src.stop(t+0.5);
  }catch(e){}
}
// "챙!" — 방패막기 성공(차단) 금속성 효과음. 비조화 고음 부분음 + 짧은 밝은 노이즈 어택
function clang(){ if(!G.sound)return;
  try{
    actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    const t=actx.currentTime;
    const partials=[2100,3170,4650,6050]; // 정수배가 아닌 주파수 = 금속 질감
    partials.forEach((f,i)=>{
      const o=actx.createOscillator(), g=actx.createGain();
      o.type="square"; o.frequency.value=f;
      const v=0.11/(i+1);
      g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(v,t+0.004);
      g.gain.exponentialRampToValueAtTime(0.0001,t+0.20+i*0.04); // 고음일수록 짧게 → 링잉
      o.connect(g); g.connect(actx.destination); o.start(t); o.stop(t+0.32);
    });
    const n=actx.sampleRate*0.05, buf=actx.createBuffer(1,n,actx.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/n,1.5);
    const src=actx.createBufferSource(); src.buffer=buf;
    const f=actx.createBiquadFilter(); f.type="highpass"; f.frequency.value=3000; // 부딪히는 어택
    const ng=actx.createGain(); ng.gain.setValueAtTime(0.2,t); ng.gain.exponentialRampToValueAtTime(0.0001,t+0.07);
    src.connect(f); f.connect(ng); ng.connect(actx.destination); src.start(t); src.stop(t+0.07);
  }catch(e){}
}

// ---------- 3인칭 카메라 (캐릭터 궤도) ----------
const cam={ yaw:Math.atan2(G.player.x,G.player.z), pitch:0.58, dist:7.5 };
function updateCamera(){
  const tx=G.player.x, tz=G.player.z, ty=1.25; // 캐릭터 상체를 바라봄
  const cp=Math.cos(cam.pitch), sp=Math.sin(cam.pitch);
  const ox=cam.dist*cp*Math.sin(cam.yaw), oz=cam.dist*cp*Math.cos(cam.yaw), oy=cam.dist*sp;
  camera.position.set(tx+ox, ty+oy, tz+oz);
  camera.lookAt(tx,ty,tz);
}
// 카메라 기준 전/우 벡터(바닥 XZ) — W=카메라가 바라보는 방향
function camBasis(){
  const fx=-Math.sin(cam.yaw), fz=-Math.cos(cam.yaw);      // forward (카메라→타깃)
  const rx= Math.cos(cam.yaw), rz=-Math.sin(cam.yaw);      // right
  return {fx,fz,rx,rz};
}

const move={x:0,z:0}; // 정규화된 입력(-1..1)
function readKeyMove(){
  let f=0,r=0;
  // e.code(물리 키)로 판정 — Shift로 대소문자가 바뀌어도 키가 안 끼임
  if(M.keys.has("KeyW")||M.keys.has("ArrowUp"))f+=1;
  if(M.keys.has("KeyS")||M.keys.has("ArrowDown"))f-=1;
  if(M.keys.has("KeyD")||M.keys.has("ArrowRight"))r+=1;
  if(M.keys.has("KeyA")||M.keys.has("ArrowLeft"))r-=1;
  return {f,r};
}
let heroFace=Math.atan2(G.player.x,G.player.z);

const DASH_TIME=0.2, DASH_DIST=3.0, DASH_CD=0.0; // 대쉬 거리 단축(5.0→3.0). CD=0 → 행동력만 있으면 즉시 연속 대쉬
const DASH_SPEED=DASH_DIST/DASH_TIME;
let dashTimer=0, dashCooldown=0, dashDirX=0, dashDirZ=1;
// 행동력(스태미나): 대쉬 1회당 DASH_COST 소모. 꽉 찬 상태(=MAX)면 연속 5회 대쉬 가능. 대쉬/쿨다운 중이 아니면 자연 회복.
const STAMINA_MAX=100, DASH_COST=20, STAMINA_REGEN=16; // MAX/COST=5회, 회복 16/초(완충 ~6초)

function tryDash(){
  if(dashTimer>0 || dashCooldown>0 || stamina<DASH_COST) return; // 진행중·쿨다운·행동력 부족이면 무시
  let f=0,r=0; const km=readKeyMove(); f=km.f; r=km.r; if(stickActive){ f+=-joy.y; r+=joy.x; }
  let dx,dz;
  if(Math.hypot(f,r)>0.01){ const b=camBasis(); dx=b.fx*f+b.rx*r; dz=b.fz*f+b.rz*r; } // 입력 방향
  else { dx=Math.sin(heroFace); dz=Math.cos(heroFace); }                              // 없으면 바라보는 방향
  const l=Math.hypot(dx,dz)||1; dashDirX=dx/l; dashDirZ=dz/l;
  dashTimer=DASH_TIME; dashCooldown=DASH_TIME+DASH_CD;
  stamina=Math.max(0, stamina-DASH_COST); // 행동력 소모
  heroFace=Math.atan2(dashDirX,dashDirZ);
  // 시작 충격파 + 잔상 즉시 시작
  dashBurstT=0; dashBurstX=G.player.x; dashBurstZ=G.player.z; dashBurst.visible=true;
  // 대쉬 효과음 없음(장판 폭발음만)
}
function applyMovement(dt){
  if(dashCooldown>0) dashCooldown-=dt;
  // 행동력 자연 회복(대쉬/쿨다운 중이 아닐 때만 → 연속 대쉬는 정확히 5회까지)
  if(dashTimer<=0 && dashCooldown<=0 && stamina<STAMINA_MAX) stamina=Math.min(STAMINA_MAX, stamina+STAMINA_REGEN*dt);
  heroMoving=false; heroSpeedFrac=0; dashFx=false;
  // 대쉬 중: 일반 입력 무시하고 순간이동
  if(dashTimer>0){
    dashTimer-=dt;
    const sp=DASH_SPEED*dt;
    G.player.x+=dashDirX*sp; G.player.z+=dashDirZ*sp;
    heroFace=Math.atan2(dashDirX,dashDirZ);
    heroMoving=true; heroSpeedFrac=1; dashFx=true;
    return;
  }
  // 일반 이동(WASD/조이스틱)
  const km=readKeyMove();
  let f=km.f, r=km.r;
  if(stickActive){ f+=-joy.y; r+=joy.x; }
  const len=Math.hypot(f,r);
  if(len>0.001){
    f/=Math.max(1,len); r/=Math.max(1,len);
    const b=camBasis();
    const mx=b.fx*f+b.rx*r, mz=b.fz*f+b.rz*r;
    const mlen=Math.hypot(mx,mz)||1;
    const frac=Math.min(1,len);
    const sp=M.MOVE_SPEED*dt*frac;
    G.player.x+=mx/mlen*sp; G.player.z+=mz/mlen*sp;
    heroFace=Math.atan2(mx,mz);
    heroMoving=true; heroSpeedFrac=0.5;
  }
}
function clampPlayer(){
  let pd=Math.hypot(G.player.x,G.player.z)||1;
  const minD=M.BOSS_R+0.5, maxD=M.ARENA_R;
  if(pd<minD){G.player.x=G.player.x/pd*minD;G.player.z=G.player.z/pd*minD;}
  if(pd>maxD){G.player.x=G.player.x/pd*maxD;G.player.z=G.player.z/pd*maxD;}
}
function syncHero(){
  hero.position.set(G.player.x,0,G.player.z);
  hero.rotation.y=lerpAngle(hero.rotation.y,heroFace,0.2);
  // 대쉬 시 발밑 링 강조
  foot.scale.setScalar(THREE.MathUtils.lerp(foot.scale.x, dashFx?1.3:1.0, 0.25));
  foot.material.opacity=THREE.MathUtils.lerp(foot.material.opacity, dashFx?1.0:0.7, 0.25);
  const pang=Math.atan2(G.player.z,G.player.x);
  const ex=Math.cos(pang)*M.ARENA_R, ez=Math.sin(pang)*M.ARENA_R;
  aimLine.geometry.setFromPoints([new THREE.Vector3(0,0.05,0),new THREE.Vector3(ex,0.05,ez)]);
}

// ---------- 입력: 키보드 ----------
addEventListener("keydown",e=>{
  if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)) e.preventDefault();
  if((e.code==="ShiftLeft"||e.code==="ShiftRight") && !e.repeat) tryDash(); // 누르는 순간 1회 대쉬
  // 단축키: Space/Enter=시작·중지(게임오버 시 재시작), R=리셋, F1/F2/F3=물약
  if(e.code==="F1"||e.code==="F2"||e.code==="F3"){ e.preventDefault(); if(!e.repeat) usePotion(e.code==="F1"?0:e.code==="F2"?1:2); }
  if(!e.repeat){
    if(e.code==="Space"||e.code==="Enter"){ e.preventDefault(); G.running?stop():start(); }
    else if(e.code==="KeyR"){ tryShield(); } // R = 방패막기
    else if(e.code==="KeyP"){ stop(); M.reset(); M.newRings(); resetAoe(); over.classList.remove("show"); } // P = 리셋
  }
  M.keys.add(e.code);   // 물리 키 코드로 저장(Shift 대소문자 문제 회피)
});
addEventListener("keyup",e=>M.keys.delete(e.code));
// 포커스를 잃으면(탭 전환/포인터락 등) 키 상태 초기화 — 키 끼임 방지
addEventListener("blur",()=>M.keys.clear());
document.addEventListener("pointerlockchange",()=>{ if(document.pointerLockElement!==el) M.keys.clear(); });

// ---------- 입력: 포인터 (드래그=카메라, 조이스틱=이동, 핀치=줌) ----------
const isTouch = matchMedia("(pointer:coarse)").matches || ("ontouchstart" in window);
if(isTouch) document.body.classList.add("touch");
const stickBase=$("#stickBase"), stickKnob=$("#stickKnob"), stickZone=$("#stick");
const joy={x:0,y:0}; let stickActive=false, stickId=null, stickOrigin={x:0,y:0};
const lookPtrs=new Map(); let pinchDist=0; let pointerLocked=false;

function startStick(e){
  stickActive=true; stickId=e.pointerId; stickOrigin={x:e.clientX,y:e.clientY};
  stickBase.style.display=stickKnob.style.display="block";
  stickBase.style.left=stickKnob.style.left=e.clientX+"px";
  stickBase.style.top=stickKnob.style.top=e.clientY+"px";
}
function moveStick(e){
  const dx=e.clientX-stickOrigin.x, dy=e.clientY-stickOrigin.y, R=55;
  const len=Math.hypot(dx,dy), k=len>R?R/len:1;
  joy.x=clamp(dx*k/R,-1,1); joy.y=clamp(dy*k/R,-1,1);
  stickKnob.style.left=(stickOrigin.x+dx*k)+"px"; stickKnob.style.top=(stickOrigin.y+dy*k)+"px";
}
function endStick(){ stickActive=false; stickId=null; joy.x=joy.y=0; stickBase.style.display=stickKnob.style.display="none"; }

const el=renderer.domElement;
el.addEventListener("pointerdown",e=>{
  if(actx && actx.state==="suspended") actx.resume();
  // 터치 + 화면 왼쪽-하단(조이스틱 영역)이면 이동, 아니면 카메라
  if(isTouch && !stickActive && e.clientX < innerWidth*0.46 && e.clientY > innerHeight*0.45){
    startStick(e);
  } else {
    lookPtrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(lookPtrs.size===2){ const p=[...lookPtrs.values()]; pinchDist=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y); }
  }
  try{el.setPointerCapture(e.pointerId);}catch(_){}
});
el.addEventListener("pointermove",e=>{
  if(stickActive && e.pointerId===stickId){ moveStick(e); return; }
  if(pointerLocked) return; // 락 상태에선 mousemove(movementX)로 처리
  if(lookPtrs.has(e.pointerId)){
    const prev=lookPtrs.get(e.pointerId);
    if(lookPtrs.size>=2){
      lookPtrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
      const p=[...lookPtrs.values()]; const d=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);
      if(pinchDist) cam.dist=clamp(cam.dist*(pinchDist/d),4,30); pinchDist=d;
      return;
    }
    const dx=e.clientX-prev.x, dy=e.clientY-prev.y;
    cam.yaw   -= dx*0.005;
    cam.pitch = clamp(cam.pitch + dy*0.005, 0.12, 1.45);
    lookPtrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  }
});
function endPtr(e){
  if(e.pointerId===stickId) endStick();
  lookPtrs.delete(e.pointerId);
  if(lookPtrs.size<2) pinchDist=0;
}
el.addEventListener("pointerup",endPtr);
el.addEventListener("pointercancel",endPtr);
el.addEventListener("wheel",e=>{ e.preventDefault(); cam.dist=clamp(cam.dist+Math.sign(e.deltaY)*1.2,4,30); },{passive:false});

// 마우스 프리룩(포인터 락) — 화면 클릭 시 마우스 시점, ESC로 해제. 데스크톱 전용(터치는 드래그 사용)
if(!isTouch){
  el.addEventListener("click",()=>{
    if(!pointerLocked){ try{ const r=el.requestPointerLock&&el.requestPointerLock(); if(r&&r.catch)r.catch(()=>{}); }catch(_){} }
  });
  document.addEventListener("pointerlockchange",()=>{ pointerLocked=(document.pointerLockElement===el); });
  document.addEventListener("mousemove",e=>{
    if(!pointerLocked) return;
    cam.yaw  -= e.movementX*0.0024;
    cam.pitch = clamp(cam.pitch + e.movementY*0.0024, 0.12, 1.45);
  });
}

// ---------- 컨트롤 ----------
function endGame(title,msg){
  G.running=false; $("#startBtn").textContent="▶ 시작";
  over.querySelector("h2").textContent=title||"게임 실패";
  over.querySelector("p").textContent=msg||"";
  over.classList.add("show");
}
G.onGameOver=()=>endGame("게임 실패","잘못된 색 구슬 2개가 보스에 들어갔습니다.");
function start(){
  if(G.running) return;
  G.running=true; $("#startBtn").textContent="⏸ 중지"; over.classList.remove("show");
  M.startRound(); resetAoe();
  heroFace=Math.atan2(G.player.x,G.player.z);
  cam.yaw=Math.atan2(G.player.x,G.player.z); cam.pitch=0.5; cam.dist=15; // 보스/링이 잘 보이는 시점
  if(actx && actx.state==="suspended") actx.resume();
}
function stop(){ G.running=false; $("#startBtn").textContent="▶ 시작"; }
$("#clock").addEventListener("change",e=>{ G.clock=+e.target.value; if(G.running){ G.cols=[]; G.respawn=0; G.beam=null; M.placePlayerAtClock(G.clock); } else { M.placePlayerAtClock(G.clock); } });
$("#startBtn").addEventListener("click",()=>G.running?stop():start());
$("#resetBtn").addEventListener("click",()=>{ stop(); M.reset(); M.newRings(); resetAoe(); over.classList.remove("show"); });
$("#retryBtn").addEventListener("click",start);

// ---------- main loop ----------
let last=performance.now();
function frame(now){
  const dt=Math.min(0.05,(now-last)/1000)||0; last=now;
  try{
    applyMovement(dt);
    if(G.running) M.update(dt);   // 내부 이동은 externalMove로 skip, 클램프+게임 진행만
    else clampPlayer();
    updateHeroAnim(dt); updateEmbers(dt); updateAoe(dt); updateDashFx(dt); updatePotions(dt); updateShield(dt);
    syncBoss(now); syncRings(); syncOrbs(); syncBeam(); syncFx(); syncAoe(); syncHero(); updateHeadHp();
    updateCamera(); updateHUD();
    composer.render();
  }catch(e){ if(!frame._logged){ console.error('frame error', e); frame._logged=true; } }
  requestAnimationFrame(frame);
}

// ---------- init ----------
M.newRings();
M.placePlayerAtClock(G.clock);
heroFace=Math.atan2(G.player.x,G.player.z);
cam.yaw=Math.atan2(G.player.x,G.player.z);
requestAnimationFrame(frame);

window.MUSPEL_RPG = {scene, camera, renderer, composer, cam, M, tick:()=>frame(performance.now()),
  step:(dt,n)=>{ for(let i=0;i<(n||1);i++){ applyMovement(dt); if(G.running)M.update(dt); else clampPlayer(); updateHeroAnim(dt); updateAoe(dt); updateDashFx(dt); updatePotions(dt); updateShield(dt); } },
  tryDash:()=>tryDash(), tryShield:()=>tryShield(),
  dbg:()=>({hp:+hp.toFixed(1), stamina:+stamina.toFixed(1), shieldTimer:+shieldTimer.toFixed(2), shieldCharges:+shieldCharges.toFixed(2), potionCd:potionCd.map(v=>+v.toFixed(2)), aoeTimer:+aoeTimer.toFixed(2), running:G.running, pointerLocked, dashFx, heroSpeedFrac,
    dashTimer:+dashTimer.toFixed(3), dashCooldown:+dashCooldown.toFixed(3),
    player:{x:+G.player.x.toFixed(2),z:+G.player.z.toFixed(2)},
    aoes:aoes.map(a=>({t:+a.t.toFixed(2),hit:a.hit,d:+Math.hypot(G.player.x-a.x,G.player.z-a.z).toFixed(2)}))})};
</script>
